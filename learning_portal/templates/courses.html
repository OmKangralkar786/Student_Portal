{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Background Image */
    body {
        background: url("{% static 'portal/images/coursee.jpg' %}") no-repeat center center fixed;
        background-size: cover;
    }

    /* Enhanced Container */
    .courses-container {
        background: rgba(255, 255, 255, 0.204);
        border-radius: 20px;
        padding: 2.5rem;
        margin-top: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    /* Card Styling */
    .course-card {
        height: 100%;
        transition: transform 0.3s ease;
        border: none;
        border-radius: 15px;
        overflow: hidden;
    }

    .course-card:hover {
        transform: translateY(-10px);
    }

    .course-card .card-body {
        padding: 1.5rem;
    }

    .course-card .card-title {
        color: var(--primary-color);
        font-weight: 600;
        margin-bottom: 1rem;
    }

    .course-card .card-text {
        color: var(--text-color);
        margin-bottom: 1.5rem;
    }

    /* Button Styling */
    .view-materials-btn {
        background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
        border: none;
        padding: 0.8rem 1.5rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        border-radius: 10px;
        transition: all 0.3s ease;
    }

    .view-materials-btn:hover {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }
</style>

<div class="courses-container">
    <h2 class="text-center mb-4"><i class="fas fa-book me-2"></i>Available Courses</h2>
    <p class="text-center mb-4">Select a course to view study materials.</p>

    <div class="row g-4">
        {% for course in courses %}
            <div class="col-12 col-md-6">
                <div class="card course-card shadow">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="fas fa-graduation-cap me-2"></i>{{ course.name }}
                        </h5>
                        <p class="card-text">{{ course.description }}</p>
                        <a href="{% url 'materials' course.id %}" class="btn view-materials-btn">
                            <i class="fas fa-book-open me-2"></i>View Materials
                        </a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
