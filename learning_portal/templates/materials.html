{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    /* Background Image */
    body {
        background: url("{% static 'portal/images/coursee.jpg' %}") no-repeat center center fixed;
        background-size: cover;
    }

    /* Enhanced Container */
    .materials-container {
        background: rgba(255, 255, 255, 0.234);
        border-radius: 20px;
        padding: 2.5rem;
        margin-top: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    /* Header Styling */
    .materials-header {
        text-align: center;
        margin-bottom: 2.5rem;
    }

    .materials-header h2 {
        color: var(--primary-color);
        font-weight: 700;
        margin-bottom: 1rem;
    }

    /* List Styling */
    .materials-list {
        list-style: none;
        padding: 0;
    }

    .material-item {
        background: rgba(255, 255, 255, 0.8);
        border-radius: 10px;
        padding: 1rem 1.5rem;
        margin-bottom: 1rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
    }

    .material-item:hover {
        transform: translateX(5px);
        background: rgba(52, 152, 219, 0.1);
    }

    .material-link {
        color: var(--secondary-color);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
        flex-grow: 1;
    }

    .material-link:hover {
        color: var(--primary-color);
    }

    .material-link i {
        margin-right: 0.5rem;
        color: var(--secondary-color);
    }

    /* Back Button Styling */
    .back-btn {
        background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
        border: none;
        padding: 0.8rem 2rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-top: 2rem;
        border-radius: 10px;
        transition: all 0.3s ease;
    }

    .back-btn:hover {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }
</style>

<div class="materials-container">
    <div class="materials-header">
        <h2><i class="fas fa-book me-2"></i>Study Materials</h2>
    </div>

    {% if materials %}
        <ul class="materials-list">
            {% for material in materials %}
                <li class="material-item">
                    <a href="{{ material.file.url }}" class="material-link">
                        <i class="fas fa-file-alt"></i>{{ material.title }}
                    </a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <div class="text-center">
            <p class="text-muted">No materials available for this course.</p>
        </div>
    {% endif %}

    <div class="text-center mt-4">
        <a href="{% url 'courses' %}" class="btn back-btn">
            <i class="fas fa-arrow-left me-2"></i>Back to Courses
        </a>
    </div>
</div>
{% endblock %}
