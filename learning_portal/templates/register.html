{% extends 'base.html' %}
{% load static %}  <!-- ✅ Ensure static files are loaded -->

{% block content %}
<style>
    /* Background Image */
    body {
        background: url("{% static 'portal/images/register.jpg' %}") no-repeat center center fixed;
        background-size: cover;
    }
    
    /* Enhanced Register Container */
    .register-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }

    /* Modern Card Design */
    .register-card {
        background: rgba(255, 255, 255, 0.271);
        border-radius: 20px;
        padding: 2.5rem;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Form Styling */
    .form-label {
        font-weight: 600;
        color: var(--primary-color);
        margin-bottom: 0.5rem;
    }

    .form-control {
        border-radius: 10px;
        padding: 0.8rem 1rem;
        border: 2px solid #e0e0e0;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        border-color: var(--secondary-color);
        box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
    }

    /* Button Styling */
    .register-btn {
        background: linear-gradient(135deg, var(--secondary-color), var(--primary-color));
        border: none;
        padding: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-top: 1.5rem;
    }

    .register-btn:hover {
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        transform: translateY(-2px);
    }

    /* Link Styling */
    .login-link {
        color: var(--secondary-color);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }

    .login-link:hover {
        color: var(--primary-color);
        text-decoration: underline;
    }

    /* Card Header */
    .card-header {
        background: transparent !important;
        border-bottom: none;
        padding-bottom: 0;
    }

    .card-header h3 {
        color: var(--primary-color);
        font-weight: 700;
        margin-bottom: 0;
    }

    /* Card Footer */
    .card-footer {
        background: transparent;
        border-top: none;
        padding-top: 1.5rem;
        text-align: center;
    }

    /* Input Group Icons */
    .input-group-text {
        background-color: transparent;
        border-right: none;
        color: var(--secondary-color);
    }

    .form-control {
        border-left: none;
    }

    .form-control:focus {
        border-left: none;
    }
</style>

<div class="register-container">
    <div class="register-card">
        <div class="card-header text-center">
            <h3><i class="fas fa-user-plus me-2"></i>Register</h3>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label for="id_username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" id="id_username" name="username" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="id_email" class="form-label">Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="id_email" name="email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        <input type="password" class="form-control" id="id_password" name="password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary register-btn w-100">
                    <i class="fas fa-user-plus me-2"></i>Register
                </button>
            </form>
        </div>
        <div class="card-footer">
            <p class="mb-0">Already have an account? <a href="{% url 'login' %}" class="login-link">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}
